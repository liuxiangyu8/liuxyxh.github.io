<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播放历史 - 云影院</title>
    <meta name="description" content="云影院播放历史页面，查看您最近观看的视频记录，包括播放进度和观看时间。">
    <meta name="keywords" content="播放历史,观看记录,视频历史,云影院">
    <link href="https://fastly.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fastly.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="static/css/index.css" rel="stylesheet">
</head>

<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html" style="color: #ff6b00; font-size: 1.5rem; font-weight: 700;"
                id="navbarBrand">
                <i class="bi bi-film"></i> 云影院
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto" id="navbarMenu">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="vip.html">VIP解析</a>
                    </li>

                </ul>
                <form class="d-flex">
                    <input type="text" class="search-input me-2" placeholder="搜索你想看的电影" id="searchInput">
                    <button type="button" class="search-btn" onclick="searchMovies()"><i
                            class="bi bi-search"></i></button>
                    <button type="button" class="search-btn ms-2" onclick="location.href='record.html'">
                        <i class="bi bi-clock-history"></i> 历史
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- 播放历史区域 -->
    <div class="container mt-5 pt-5">
        <h2 class="mb-4" style="color: white; font-weight: 600;">播放历史</h2>

        <!-- 历史记录列表 -->
        <div class="row" id="historyContainer">
            <div class="loading">
                <i class="bi bi-hourglass-split" style="font-size: 2rem; margin-bottom: 10px;"></i>
                <p>加载中...</p>
            </div>
        </div>

        <!-- 空状态提示 -->
        <div class="text-center py-10" id="emptyState" style="display: none;">
            <i class="bi bi-clock-history"
                style="font-size: 4rem; color: rgba(255, 255, 255, 0.3); margin-bottom: 20px;"></i>
            <h4 style="color: rgba(255, 255, 255, 0.7);">暂无播放历史</h4>
            <p style="color: rgba(255, 255, 255, 0.4); margin-top: 10px;">去首页观看视频，开始您的观影之旅</p>
            <button class="btn btn-warning mt-4" onclick="location.href='index.html'">去首页</button>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5 style="color: #ff6b00; margin-bottom: 15px;" id="footerName"></h5>
                    <p style="color: rgba(255, 255, 255, 0.6);" id="footerDescription"></p>
                </div>
            </div>
            <div class="row mt-4">
                <div class="col text-center">
                    <p style="color: rgba(255, 255, 255, 0.4);" id="footerCopyright">
                        本站不存储任何视频内容，所有VIP视频解析接口也来自于互联网，请勿用于任何商业用途，否则后果自负。解析中出现的广告勿信，与本站无关。</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://fastly.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/record.js"></script>
</body>

</html>
